<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>MyShop</h1>
        <div class="cart">
            🛒 Cart: <span id="cart-count">0</span>
        </div>
    </header>

    <section class="products">

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="">
            <h2>Smart Watch</h2>
            <p>$99</p>
            <button onclick="addToCart('Smart Watch',99)">
                Add to Cart
            </button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="">
            <h2>Headphones</h2>
            <p>$59</p>
            <button onclick="addToCart('Headphones',59)">
                Add to Cart
            </button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/200" alt="">
            <h2>Laptop</h2>
            <p>$799</p>
            <button onclick="addToCart('Laptop',799)">
                Add to Cart
            </button>
        </div>

    </section>

    <section class="cart-items">
        <h2>Shopping Cart</h2>
        <ul id="cart-list"></ul>
        <h3>Total: $<span id="total">0</span></h3>
    </section>

    <script src="script.js"></script>

</body>
</html>
